name: Check rentals

on:
  schedule:
    # Every hour, at minute 47 (a bit before the hour - also avoids the
    # traffic spike GitHub sees right on the hour, when huge numbers of
    # other repos' cron jobs all fire at once).
    # Hours 5-21 UTC = roughly 7:47am-11:47pm Netherlands time (CEST, UTC+2)
    # right now. After the clocks change back to CET (UTC+1) in late
    # October, this will drift an hour earlier locally (~6:47am-10:47pm)
    # until this line is updated to "47 6-22 * * *" for winter.
    # Format: minute hour day month weekday (all in UTC)
    - cron: "47 5-21 * * *"
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write  # needed so the workflow can commit the report + seen-state back to the repo

jobs:
  check-rentals:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install --with-deps chromium

      - name: Run the rental checker
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          REPORT_URL: ${{ secrets.REPORT_URL }}
        run: python check_all_rentals.py

      - name: Publish report to GitHub Pages folder
        run: |
          mkdir -p docs
          cp report_all_rentals.html docs/index.html

      - name: Commit updated report and seen-state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update rental report"
          file_pattern: "docs/index.html seen_all_rentals.json"
