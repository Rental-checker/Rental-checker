name: Check rentals

on:
  schedule:
    # Trying minute :13 instead of :47 - a less "round" offset, in case
    # that helps avoid whatever's causing GitHub to skip/delay some
    # scheduled runs during the day (this is a best-effort experiment,
    # not a guaranteed fix - GitHub's schedule trigger doesn't promise
    # exact timing, especially under high platform load).
    #
    # Daytime: hourly. Hours 5-16 UTC = roughly 7:13am-6:13pm Netherlands
    # time (CEST, UTC+2) right now.
    - cron: "13 5-16 * * *"
    # Evening: every 2 hours instead of hourly, since daytime coverage
    # matters more. Hours 17,19,21 UTC = roughly 7:13pm, 9:13pm, 11:13pm
    # Netherlands time (CEST, UTC+2) right now.
    - cron: "13 17-21/2 * * *"
    # After the clocks change back to CET (UTC+1) in late October, all of
    # this will drift an hour earlier locally until updated for winter:
    # daytime -> "13 6-17 * * *", evening -> "13 18-22/2 * * *"
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write  # needed so the workflow can commit the report + seen-state back to the repo

jobs:
  check-rentals:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install --with-deps chromium

      - name: Run the rental checker
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          REPORT_URL: ${{ secrets.REPORT_URL }}
        run: python check_all_rentals.py

      - name: Publish report to GitHub Pages folder
        run: |
          mkdir -p docs
          cp report_all_rentals.html docs/index.html

      - name: Commit updated report and seen-state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update rental report"
          file_pattern: "docs/index.html seen_all_rentals.json"
