name: Check rentals

on:
  schedule:
    # Shifted 1 hour earlier than the "target" time to compensate for a
    # consistent lag we observed (runs landing anywhere from ~20 to ~90
    # minutes late, including the last evening run regularly slipping
    # past midnight). This is a pragmatic compensation, not a real fix -
    # GitHub's schedule trigger doesn't guarantee exact timing, and the
    # delay didn't meaningfully change when we tried a different minute
    # offset, so it looks like general queuing delay rather than
    # something tied to which minute we pick.
    #
    # Daytime: hourly. Hours 4-15 UTC = roughly 6:13am-5:13pm Netherlands
    # time (CEST, UTC+2) right now - intended to actually land around
    # 7:13am-6:13pm after the typical delay.
    - cron: "13 4-15 * * *"
    # Evening: every 2 hours. Hours 16,18,20 UTC = roughly 6:13pm, 8:13pm,
    # 10:13pm Netherlands time - intended to actually land around
    # 7:13pm, 9:13pm, 11:13pm after the typical delay.
    - cron: "13 16-20/2 * * *"
    # After the clocks change back to CET (UTC+1) in late October, all of
    # this will drift an hour earlier locally until updated for winter:
    # daytime -> "13 5-16 * * *", evening -> "13 17-21/2 * * *"
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab

permissions:
  contents: write  # needed so the workflow can commit the report + seen-state back to the repo

jobs:
  check-rentals:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install --with-deps chromium

      - name: Run the rental checker
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          REPORT_URL: ${{ secrets.REPORT_URL }}
        run: python check_all_rentals.py

      - name: Publish report to GitHub Pages folder
        run: |
          mkdir -p docs
          cp report_all_rentals.html docs/index.html

      - name: Commit updated report and seen-state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update rental report"
          file_pattern: "docs/index.html seen_all_rentals.json"
